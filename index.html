<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa — Configurador de Pared y Techo</title>
<script src="https://static.sketchfab.com/api/sketchfab-viewer-1.12.1.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --azul: #1F3864;
    --azul-claro: #2E4D7A;
    --fondo: #F4F6F9;
    --borde: #DDE3EC;
    --texto: #1E293B;
    --texto-sec: #64748B;
    --ok: #16A34A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--azul);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    z-index: 10;
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
  header .sub { font-size: 10px; font-weight: 400; color: #B9C7DE; margin-top: 2px; }
  header .brand {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    background: rgba(255,255,255,0.12); padding: 4px 10px; border-radius: 6px; letter-spacing: 0.04em;
  }

  main {
    flex: 1; display: grid; grid-template-columns: 1fr 300px; min-height: 0;
  }
  @media (max-width: 860px) {
    main { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
  }

  .viewer-wrap { position: relative; background: #11161F; }
  #sk-iframe { width: 100%; height: 100%; border: 0; display: block; }

  .panel {
    background: white; border-left: 1px solid var(--borde);
    display: flex; flex-direction: column; overflow-y: auto;
  }

  .section { padding: 14px 16px; border-bottom: 1px solid var(--borde); }
  .section h2 {
    font-size: 10px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--texto-sec); margin-bottom: 10px;
  }

  .swatch-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .swatch {
    aspect-ratio: 1;
    border-radius: 9px;
    border: 2px solid var(--borde);
    cursor: pointer;
    background-size: cover;
    background-position: center;
    background-color: #EEF2F8;
    position: relative;
    transition: all 0.15s ease;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
  }
  .swatch:hover { border-color: #B9C7DE; transform: translateY(-1px); }
  .swatch.active { border-color: var(--ok); box-shadow: 0 0 0 2px rgba(22,163,74,0.25); }
  .swatch.loading { opacity: 0.55; pointer-events: none; }
  .swatch.loading::after {
    content: '⏳';
    position: absolute; top: 4px; right: 4px;
    font-size: 11px;
  }
  .swatch span {
    font-size: 8px; font-weight: 700; color: white;
    background: rgba(0,0,0,0.55); width: 100%; padding: 3px 4px;
    text-align: center; line-height: 1.2;
  }
  .swatch.empty {
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--texto-sec); text-align: center; padding: 4px;
  }

  .upload-row {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }
  .upload-row input[type="file"] {
    flex: 1;
    font-size: 9px;
  }
  .upload-row input[type="text"] {
    width: 70px;
    font-size: 9px;
    padding: 4px 6px;
    border: 1px solid var(--borde);
    border-radius: 5px;
    font-family: inherit;
  }
  .btn-add {
    font-size: 9px; font-weight: 700; padding: 5px 8px;
    border-radius: 5px; border: 1px solid var(--azul);
    background: var(--azul); color: white; cursor: pointer;
  }
  .btn-add:hover { background: var(--azul-claro); }

  .status-msg { padding: 16px; font-size: 11px; color: #94A3B8; line-height: 1.6; }
  .status-msg.error { color: #DC2626; }

  .inspector-toggle {
    font-size: 9px; color: var(--texto-sec); text-align: center; padding: 8px;
    cursor: pointer; border-top: 1px dashed var(--borde); flex-shrink: 0;
  }
  .inspector-toggle:hover { color: var(--azul); }
  #rawInspector {
    display: none; max-height: 180px; overflow-y: auto; padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #94A3B8;
    border-top: 1px solid var(--borde); background: #FAFBFC;
  }
  #rawInspector div { padding: 2px 0; border-bottom: 1px solid #F0F2F5; }

  .map-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 9px; color: var(--texto-sec); margin-top: 6px;
  }
  .map-row select {
    flex: 1; font-size: 9px; padding: 3px 4px; border: 1px solid var(--borde); border-radius: 5px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Configurador · Pared y Techo</h1>
    <div class="sub">Cambio de textura en vivo (Sketchfab)</div>
  </div>
  <div class="brand">SMART BUILDING URUGUAY</div>
</header>

<main>
  <div class="viewer-wrap">
    <iframe id="sk-iframe" title="Modelo" src="" allow="autoplay; fullscreen; xr-spatial-tracking"></iframe>
  </div>

  <div class="panel">

    <div class="section" id="setupSection">
      <h2>Paso 1 · Confirmar canales</h2>
      <div class="status-msg" id="setupMsg">Cargando modelo y materiales…</div>
      <div id="mapRows" style="display:none">
        <div class="map-row">
          Pared →
          <select id="mapWall"></select>
        </div>
        <div class="map-row">
          Techo →
          <select id="mapRoof"></select>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Pared / Revestimiento</h2>
      <div class="swatch-grid" id="wallSwatches"></div>
      <div class="upload-row">
        <input type="file" id="wallFile" accept="image/*">
        <input type="text" id="wallLabel" placeholder="Nombre">
        <button class="btn-add" id="wallAdd">+</button>
      </div>
    </div>

    <div class="section">
      <h2>Techo / Cubierta</h2>
      <div class="swatch-grid" id="roofSwatches"></div>
      <div class="upload-row">
        <input type="file" id="roofFile" accept="image/*">
        <input type="text" id="roofLabel" placeholder="Nombre">
        <button class="btn-add" id="roofAdd">+</button>
      </div>
    </div>

    <div class="inspector-toggle" id="inspectorToggle">Ver materiales crudos detectados (debug)</div>
    <div id="rawInspector"></div>
  </div>
</main>

  let api = null;
  let materials = []; // lista cruda de materiales del modelo (de getMaterialList)
  let wallMaterialStateSetID = null;
  let roofMaterialStateSetID = null;
  let wallMaterialName = null;
  let roofMaterialName = null;

  // Texturas cargadas por el usuario en esta sesión: { label, dataUrl }
  let wallTextures = [PRELOADED_WALL_TEX];
  let roofTextures = [PRELOADED_ROOF_TEX];

  const client = new Sketchfab(iframeEl);

  client.init(MODEL_UID, {
    autostart: 1,
    preload: 1,
    ui_theme: 'dark',
    ui_infos: 0,
    ui_watermark: 0,
    ui_controls: 1,
    success: function (apiInstance) {
      api = apiInstance;
      api.start();
      api.addEventListener('viewerready', () => {
        api.getMaterialList((err, mats) => {
          if (err) {
            setupMsg.textContent = 'No se pudo leer la lista de materiales del modelo.';
            setupMsg.classList.add('error');
            return;
          }
          materials = mats || [];
          renderMaterialInspector();
          populateMaterialSelects();
        });
      });
    },
    error: function () {
      setupMsg.textContent = 'No se pudo cargar el modelo de Sketchfab. Verificá el UID o tu conexión.';
      setupMsg.classList.add('error');
    }
  });

  function renderMaterialInspector() {
    rawInspector.innerHTML = materials
      .map(m => `<div>[${m.stateSetID}] ${m.name}</div>`)
      .join('') || '<div>No se encontraron materiales.</div>';
  }

  // Intenta preseleccionar pared/techo por nombre, pero siempre deja que el
  // usuario confirme o corrija manualmente con los selects — los nombres
  // reales de material varían según cómo se haya exportado el modelo.
  function guessMaterialIndex(keyword) {
    const idx = materials.findIndex(m => m.name.toLowerCase().includes(keyword.toLowerCase()));
    return idx;
  }

  function guessMaterialIndexAny(keywords) {
    for (const k of keywords) {
      const idx = guessMaterialIndex(k);
      if (idx !== -1) return idx;
    }
    return -1;
  }

  function populateMaterialSelects() {
    setupMsg.style.display = 'none';
    mapRows.style.display = 'block';

    [mapWall, mapRoof].forEach(sel => {
      sel.innerHTML = materials
        .map((m, i) => `<option value="${i}">${m.name}</option>`)
        .join('');
    });

    const wallGuess = guessMaterialIndexAny(['wood_floor_01_1k', 'pared', 'wall', 'muro', 'fachada']);
    const roofGuess = guessMaterialIndexAny(['metal_10_1k', 'techo', 'roof', 'cubierta']);

    if (wallGuess !== -1) mapWall.value = wallGuess;
    if (roofGuess !== -1) mapRoof.value = roofGuess;

    wallMaterialStateSetID = materials[mapWall.value]?.stateSetID ?? null;
    roofMaterialStateSetID = materials[mapRoof.value]?.stateSetID ?? null;
    wallMaterialName = materials[mapWall.value]?.name ?? null;
    roofMaterialName = materials[mapRoof.value]?.name ?? null;

    mapWall.addEventListener('change', () => {
      wallMaterialStateSetID = materials[mapWall.value]?.stateSetID ?? null;
      wallMaterialName = materials[mapWall.value]?.name ?? null;
    });
    mapRoof.addEventListener('change', () => {
      roofMaterialStateSetID = materials[mapRoof.value]?.stateSetID ?? null;
      roofMaterialName = materials[mapRoof.value]?.name ?? null;
    });
  }

  // ── Carga de texturas por el usuario (drag/file → base64 → API) ─────
  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function addSwatch(container, list, label, dataUrl, materialIdGetter) {
    list.push({ label, dataUrl });
    renderSwatchGrid(container, list, materialIdGetter);
  }

  function renderSwatchGrid(container, list, materialIdGetter) {
    container.innerHTML = '';
    if (list.length === 0) {
      container.innerHTML = '<div class="swatch empty">Subí una imagen abajo para agregar la primera opción</div>';
      return;
    }
    list.forEach((tex, i) => {
      const el = document.createElement('div');
      el.className = 'swatch';
      el.style.backgroundImage = `url(${tex.dataUrl})`;
      el.innerHTML = `<span>${tex.label}</span>`;
      el.addEventListener('click', () => {
        container.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('loading');
        applyTexture(materialIdGetter(), tex.dataUrl, (ok) => {
          el.classList.remove('loading');
          if (ok) el.classList.add('active');
        });
      });
      container.appendChild(el);
    });
  }

  function applyTexture(materialRef, dataUrl, onDone) {
    if (!api || !materialRef || (materialRef.stateSetID === null && !materialRef.name)) {
      showToast('Confirmá primero el canal de material correspondiente arriba (Paso 1).', true);
      onDone && onDone(false);
      return;
    }
    api.getMaterialList((err, mats) => {
      if (err) {
        console.error('Error obteniendo materiales:', err);
        showToast('No se pudo leer la lista de materiales.', true);
        onDone && onDone(false);
        return;
      }
      // Buscamos primero por nombre exacto (patrón confirmado que funciona),
      // y si no hay match, caemos a stateSetID como respaldo.
      const mat = mats.find(m => m.name === materialRef.name)
                || mats.find(m => m.stateSetID === materialRef.stateSetID);
      if (!mat) {
        console.warn('No se encontró el material:', materialRef);
        showToast('No se encontró el material seleccionado. Probá elegirlo de nuevo en el Paso 1.', true);
        onDone && onDone(false);
        return;
      }

      // El mapa de color base puede vivir en distintos canales según el shader
      // con el que se exportó el modelo. Probamos los más comunes en orden.
      const channelKey = mat.channels?.AlbedoPBR ? 'AlbedoPBR'
                        : mat.channels?.DiffuseColor ? 'DiffuseColor'
                        : null;

      if (!channelKey) {
        showToast('Este material no tiene un canal de color editable reconocido.', true);
        onDone && onDone(false);
        return;
      }

      api.addTexture(dataUrl, (errTex, textureUid) => {
        if (errTex) {
          console.error('Error subiendo textura a Sketchfab:', errTex);
          showToast('No se pudo subir la textura a Sketchfab.', true);
          onDone && onDone(false);
          return;
        }

        mat.channels[channelKey].texture = { uid: textureUid };

        // Exponemos el material y la API en window para poder inspeccionarlos
        // en vivo desde la consola del navegador mientras diagnosticamos.
        window.__lastMat = mat;
        window.__api = api;

        api.setMaterial(mat, (errSet) => {
          if (errSet) {
            console.error('Error aplicando material:', errSet);
            showToast('La textura se subió pero no se pudo aplicar al material.', true);
            onDone && onDone(false);
          } else {
            showToast(`Textura aplicada en "${mat.name}".`, false);
            onDone && onDone(true);
          }
        });
      });
    });
  }

  function showToast(msg, isError) {
    let toast = document.getElementById('toastMsg');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'toastMsg';
      toast.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-size:11px;font-weight:600;z-index:999;transition:opacity 0.3s ease;font-family:Inter,sans-serif;';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.background = isError ? '#FEE2E2' : '#DCFCE7';
    toast.style.color = isError ? '#B91C1C' : '#15803D';
    toast.style.opacity = '1';
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => { toast.style.opacity = '0'; }, 3500);
  }

  // ── Listeners de carga de archivos ───────────────────────────
  document.getElementById('wallAdd').addEventListener('click', async () => {
    const fileInput = document.getElementById('wallFile');
    const labelInput = document.getElementById('wallLabel');
    if (!fileInput.files[0]) return;
    const dataUrl = await readFileAsDataURL(fileInput.files[0]);
    const label = labelInput.value.trim() || `Opción ${wallTextures.length + 1}`;
    addSwatch(wallSwatches, wallTextures, label, dataUrl, () => ({ stateSetID: wallMaterialStateSetID, name: wallMaterialName }));
    fileInput.value = '';
    labelInput.value = '';
  });

  document.getElementById('roofAdd').addEventListener('click', async () => {
    const fileInput = document.getElementById('roofFile');
    const labelInput = document.getElementById('roofLabel');
    if (!fileInput.files[0]) return;
    const dataUrl = await readFileAsDataURL(fileInput.files[0]);
    const label = labelInput.value.trim() || `Opción ${roofTextures.length + 1}`;
    addSwatch(roofSwatches, roofTextures, label, dataUrl, () => ({ stateSetID: roofMaterialStateSetID, name: roofMaterialName }));
    fileInput.value = '';
    labelInput.value = '';
  });

  renderSwatchGrid(wallSwatches, wallTextures, () => ({ stateSetID: wallMaterialStateSetID, name: wallMaterialName }));
  renderSwatchGrid(roofSwatches, roofTextures, () => ({ stateSetID: roofMaterialStateSetID, name: roofMaterialName }));
</script>
